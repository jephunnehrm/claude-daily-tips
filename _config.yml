title: Claude Code Daily
description: Daily tips and deep-dive playbooks for developers building with Claude Code, MCP, .NET and Azure AI
baseurl: "/claude-daily-tips"
url: "https://jephunnehrm.github.io"
markdown: kramdown
future: true
plugins:
  - jekyll-feed

collections:
  playbook:
    output: true
    permalink: /playbook/:path/

defaults:
  - scope:
      path: ""
      type: "playbook"
    values:
      layout: "chapter"
