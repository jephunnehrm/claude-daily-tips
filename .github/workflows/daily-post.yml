name: Daily Claude Tip

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Generate daily tip
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: python scripts/generate_post.py

      - name: Generate weekly chapter (Mondays only)
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "📚 Monday — generating playbook chapter..."
            python scripts/generate_chapter.py
          else
            echo "⏭️ Not Monday — skipping chapter generation"
          fi

      - name: Commit and push
        run: |
          git config user.name "Claude Tips Bot"
          git config user.email "bot@claudetips.dev"
          git add _posts/ _playbook/
          [ -d "assets/" ] && git add assets/ || echo "No assets folder yet"
          git diff --staged --quiet || git commit -m "📝 Daily tip + 📚 chapter - $(date +'%Y-%m-%d')"
          git push

      - name: Post summary
        run: |
          echo "### ✅ Content Published!" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "**Site:** https://jephunnehrm.github.io/claude-daily-tips" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
