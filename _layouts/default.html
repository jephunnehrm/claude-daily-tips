<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0f0; line-height: 1.6; }
    a { color: #a78bfa; text-decoration: none; }
    a:hover { color: #c4b5fd; }
    header { background: #1a1a2e; border-bottom: 1px solid #2d2d4e; padding: 1rem 2rem; }
    header h1 { font-size: 1.2rem; color: #a78bfa; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    .hero { text-align: center; padding: 3rem 0 2rem; }
    .hero h1 { font-size: 2.5rem; color: #a78bfa; margin-bottom: 0.5rem; }
    .hero p { color: #9ca3af; font-size: 1.1rem; }
    .posts { display: grid; gap: 1.5rem; margin-top: 2rem; }
    .post-card { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
    .post-card:hover { border-color: #a78bfa; }
    .post-card img { width: 100%; height: 220px; object-fit: cover; }
    .post-card-body { padding: 1.5rem; }
    .post-card-body h2 { font-size: 1.2rem; margin-bottom: 0.3rem; }
    .post-card-body h2 a { color: #e0e0f0; }
    .date { color: #6b7280; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .summary { color: #9ca3af; margin-bottom: 1rem; }
    .read-more { background: #a78bfa; color: white !important; padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.9rem; display: inline-block; }
    footer { text-align: center; padding: 2rem; color: #4b5563; margin-top: 3rem; border-top: 1px solid #2d2d4e; }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ site.baseurl }}/">🤖 Claude Daily Tips</a></h1>
  </header>
  <main>{{ content }}</main>
  <footer>Auto-generated daily by AI · Built with Jekyll & GitHub Pages</footer>
</body>
</html>
