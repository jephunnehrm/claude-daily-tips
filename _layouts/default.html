<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fa; color: #1a1a2e; line-height: 1.7; }
    a { color: #6d28d9; text-decoration: none; }
    a:hover { color: #4c1d95; }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 a { color: #6d28d9; }
    .header-sub { font-size: 0.8rem; color: #9ca3af; }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }

    .hero {
      background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 100%);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      margin-bottom: 2.5rem;
      border: 1px solid #c4b5fd;
    }
    .hero h1 { font-size: 2.2rem; color: #4c1d95; margin-bottom: 0.5rem; }
    .hero p { color: #6b7280; font-size: 1.05rem; }

    .posts { display: grid; gap: 1.5rem; }
    @media(min-width: 640px) { .posts { grid-template-columns: repeat(2, 1fr); } }

    .post-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .post-card:hover { box-shadow: 0 8px 24px rgba(109,40,217,0.12); transform: translateY(-2px); }
    .post-card img { width: 100%; height: 200px; object-fit: cover; }
    .post-card-body { padding: 1.25rem; }
    .post-card-body h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.4; }
    .post-card-body h2 a { color: #1a1a2e; }
    .post-card-body h2 a:hover { color: #6d28d9; }
    .date { color: #9ca3af; font-size: 0.78rem; margin-bottom: 0.5rem; }
    .summary { color: #6b7280; font-size: 0.9rem; margin-bottom: 1rem; }
    .read-more {
      background: #6d28d9;
      color: white !important;
      padding: 0.35rem 1rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
      display: inline-block;
    }
    .read-more:hover { background: #4c1d95; }

    .tag {
      background: #ede9fe;
      color: #6d28d9;
      padding: 0.15rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      margin-right: 0.3rem;
      display: inline-block;
      margin-top: 0.3rem;
    }

    footer {
      text-align: center;
      padding: 2.5rem;
      color: #9ca3af;
      font-size: 0.85rem;
      margin-top: 3rem;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ site.baseurl }}/">⚡ Claude Code Daily</a></h1>
    <span class="header-sub">Tips for developers · Auto-generated daily</span>
  </header>
  <main>{{ content }}</main>
  <footer>Auto-generated daily by AI · Built with Jekyll & GitHub Pages</footer>
</body>
</html>
