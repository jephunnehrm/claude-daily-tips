---
layout: default
---
<article style="background:#fff; border-radius:16px; padding:2rem; border:1px solid #e5e7eb; box-shadow:0 1px 4px rgba(0,0,0,0.05);">
  <header style="margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid #f3f4f6;">
    <div style="margin-bottom:0.75rem;">
      <a href="{{ site.baseurl }}/" style="font-size:0.85rem; color:#6d28d9;">← Back to all tips</a>
    </div>
    <h1 style="font-size:1.8rem; color:#1a1a2e; font-weight:700; line-height:1.3; margin-bottom:0.5rem;">{{ page.title }}</h1>
    <p style="color:#9ca3af; font-size:0.82rem; margin-bottom:0.75rem;">{{ page.date | date: "%B %d, %Y" }}</p>
    {% if page.tags %}
    <div>
      {% for tag in page.tags %}
      <span style="background:#ede9fe; color:#6d28d9; padding:0.15rem 0.65rem; border-radius:20px; font-size:0.75rem; margin-right:0.3rem; display:inline-block;">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
  .post-content img { width:100%; border-radius:12px; margin-bottom:1.5rem; border:1px solid #e5e7eb; }
  .post-content h2, .post-content h3 { color:#4c1d95; margin:1.5rem 0 0.5rem; font-weight:600; }
  .post-content p { margin-bottom:1rem; color:#374151; }
  .post-content ul, .post-content ol { margin:0.75rem 0 1rem 1.5rem; color:#374151; }
  .post-content li { margin-bottom:0.3rem; }
  .post-content code {
    background:#f3f0ff;
    color:#6d28d9;
    padding:0.15rem 0.45rem;
    border-radius:4px;
    font-family:'Fira Code', monospace;
    font-size:0.85rem;
  }
  .post-content pre {
    background:#1e1b2e;
    border:1px solid #2d2a4e;
    padding:1.25rem;
    border-radius:10px;
    overflow-x:auto;
    margin:1rem 0;
  }
  .post-content pre code {
    background:none;
    color:#c4b5fd;
    padding:0;
    font-size:0.88rem;
  }
  .post-content blockquote {
    border-left:3px solid #6d28d9;
    padding:0.5rem 1rem;
    margin:1rem 0;
    background:#f5f3ff;
    border-radius:0 8px 8px 0;
    color:#4c1d95;
  }
  .post-content a { color:#6d28d9; text-decoration:underline; }
</style>
