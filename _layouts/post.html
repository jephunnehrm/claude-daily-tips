---
layout: default
---
<article class="post-article">
  <a href="{{ site.baseurl }}/" class="back-link">← All tips</a>

  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>

  {% if page.tags %}
  <div class="post-tags">
    {% for tag in page.tags %}
    <span class="tag">{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}

  <div class="post-body">
    {{ content }}
  </div>
</article>

<style>
  .post-article {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 1.5rem 1.25rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .back-link {
    font-size: 0.82rem;
    color: #7c3aed;
    display: inline-block;
    margin-bottom: 1rem;
  }

  .post-title {
    font-size: 1.4rem;
    font-weight: 700;
    color: #111827;
    line-height: 1.35;
    margin-bottom: 0.4rem;
  }

  @media(min-width: 600px) {
    .post-title { font-size: 1.8rem; }
    .post-article { padding: 2rem; }
  }

  .post-meta {
    color: #9ca3af;
    font-size: 0.8rem;
    margin-bottom: 0.75rem;
  }

  .post-tags { margin-bottom: 1.25rem; }

  /* Post body */
  .post-body img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 1.25rem;
    border: 1px solid #e5e7eb;
  }
  .post-body h2, .post-body h3 {
    color: #4c1d95;
    font-weight: 600;
    margin: 1.5rem 0 0.5rem;
    font-size: 1.1rem;
  }
  .post-body p { color: #374151; margin-bottom: 0.9rem; }
  .post-body ul, .post-body ol {
    margin: 0.5rem 0 1rem 1.25rem;
    color: #374151;
  }
  .post-body li { margin-bottom: 0.3rem; }

  /* Inline code */
  .post-body code {
    background: #f3f0ff;
    color: #6d28d9;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
    word-break: break-word;
  }

  /* Code blocks - mobile scrollable */
  .post-body pre {
    background: #1e1b2e;
    border-radius: 10px;
    padding: 1rem;
    overflow-x: auto;
    margin: 1rem 0;
    -webkit-overflow-scrolling: touch;
  }
  .post-body pre code {
    background: none;
    color: #c4b5fd;
    padding: 0;
    font-size: 0.82rem;
    white-space: pre;
    word-break: normal;
  }

  .post-body blockquote {
    border-left: 3px solid #7c3aed;
    padding: 0.5rem 1rem;
    margin: 1rem 0;
    background: #f5f3ff;
    border-radius: 0 8px 8px 0;
    color: #4c1d95;
  }

  .post-body a { color: #7c3aed; text-decoration: underline; }
</style>
